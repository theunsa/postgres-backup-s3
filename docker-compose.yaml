# Local development/testing rig — fully self-contained, no real S3 needed.
#
#   docker compose up -d --build
#   docker compose run --rm backup sh backup.sh    # ad-hoc backup
#   docker compose run --rm backup sh restore.sh   # restore latest
#   docker compose down -v

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  createbucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      sh -c "until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
             mc mb --ignore-existing local/test-bucket"

  backup:
    build:
      context: .
      args:
        ALPINE_VERSION: '3.23'
        POSTGRES_VERSION: 18
    depends_on:
      - postgres
      - createbucket
    environment:
      SCHEDULE: '@hourly'
      BACKUP_KEEP_DAYS: 7
      PASSPHRASE: passphrase
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: test-bucket
      S3_PREFIX: backup
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: postgres
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
